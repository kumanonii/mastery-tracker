<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 300;
  min-height: 100dvh;
  transition: background 1.4s ease, color 0.8s ease;
  overflow-x: hidden;
}
.font-en { font-family: 'Pacifico', cursive; }
input, button { font-family: 'Noto Sans JP', sans-serif; }
button { cursor: pointer; border: none; background: none; }
input { outline: none; border: none; }
::-webkit-scrollbar { display: none; }

/* ===================== THEMES ===================== */
body.t1  { --bg:#f8f4f0;--bg2:#f0e8e2;--bg3:#ecddd5;--border:#d4c4b0;--border2:#c8b4a0;--text:#5a3a2a;--text2:#8a6050;--text3:#b89880;--accent:#c47878;--accent2:#a05858;--accentText:#fff;--card:#fdfaf7;--cardBorder:#ddd0c0;--progress:#c47878;--grad:linear-gradient(160deg,#f8f4f0 0%,#f0e4dc 100%); }
body.t2  { --bg:#f5f0ee;--bg2:#ede5e0;--bg3:#e8dcd6;--border:#d4c0b8;--border2:#c8b0a8;--text:#5a3a35;--text2:#8a6058;--text3:#b89888;--accent:#c4877a;--accent2:#a06860;--accentText:#fff;--card:#faf7f5;--cardBorder:#dcccc4;--progress:#c4877a;--grad:linear-gradient(160deg,#f5f0ee 0%,#ede0da 100%); }
body.t3  { --bg:#f8f5e8;--bg2:#f0edd8;--bg3:#e8e4cc;--border:#d0c8a8;--border2:#c0b898;--text:#4a4030;--text2:#7a6a50;--text3:#a89878;--accent:#a8c0b8;--accent2:#7a9c90;--accentText:#2a3c38;--card:#fdfbf0;--cardBorder:#d8d0b0;--progress:#8ab0a8;--grad:linear-gradient(160deg,#f8f5e8 0%,#ede8d0 100%); }
body.t4  { --bg:#f0f8f8;--bg2:#e4f0f0;--bg3:#d8e8e8;--border:#b0d0d8;--border2:#98c0ca;--text:#2a4048;--text2:#4a6878;--text3:#789098;--accent:#70a8b8;--accent2:#4a8898;--accentText:#fff;--card:#f8fcfc;--cardBorder:#c0d8e0;--progress:#78b8cc;--grad:linear-gradient(160deg,#eef7f8 0%,#ddeef2 100%); }
body.t5  { --bg:#f4f8f0;--bg2:#e8f0e4;--bg3:#dce8d8;--border:#b8d4b0;--border2:#a0c498;--text:#2a4025;--text2:#4a6845;--text3:#7a9870;--accent:#6a9a35;--accent2:#508025;--accentText:#fff;--card:#f8fcf5;--cardBorder:#c8dcc0;--progress:#80b840;--grad:linear-gradient(160deg,#f0f8ec 0%,#e4f0dc 100%); }
body.t6  { --bg:#f0f4f0;--bg2:#e4ece4;--bg3:#d8e4d8;--border:#a8c8b8;--border2:#90b8a8;--text:#2a4035;--text2:#4a6855;--text3:#789878;--accent:#4a7a6a;--accent2:#3a6058;--accentText:#f0f8f4;--card:#f5f8f5;--cardBorder:#bcd4c8;--progress:#5a8a78;--grad:linear-gradient(160deg,#edf4ef 0%,#ddeae2 100%); }
body.t7  { --bg:#1a3a1a;--bg2:#243a24;--bg3:#2a4a2a;--border:#3a5a3a;--border2:#4a6a4a;--text:#e8f4e8;--text2:#b0d0b0;--text3:#7aa07a;--accent:#7a9a5a;--accent2:#6a8a48;--accentText:#e8f4e8;--card:#223422;--cardBorder:#3a5a38;--progress:#6a9a4a;--grad:linear-gradient(160deg,#1a3a1a 0%,#243824 100%); }
body.t8  { --bg:#f5ede8;--bg2:#ede0d8;--bg3:#e0d0c4;--border:#b8a898;--border2:#a89888;--text:#1e3a5f;--text2:#2d5282;--text3:#5b7fa6;--accent:#1e3a5f;--accent2:#4a6a8a;--accentText:#f5ede8;--card:#faf5f0;--cardBorder:#cbbda8;--progress:#3a6080;--grad:linear-gradient(160deg,#f5ede8 0%,#e8ddd0 100%); }
body.t9  { --bg:#f5f0e8;--bg2:#ece8d8;--bg3:#e0dac8;--border:#c0b898;--border2:#b0a888;--text:#2a3a58;--text2:#4a5a78;--text3:#7890b0;--accent:#7090c0;--accent2:#5070a0;--accentText:#fff;--card:#faf8f2;--cardBorder:#ccc4a8;--progress:#6888b8;--grad:linear-gradient(160deg,#f5f0e8 0%,#eae4d4 100%); }
body.t10 { --bg:#e8eef4;--bg2:#dce4ee;--bg3:#d0dae8;--border:#a0b8d0;--border2:#88a8c8;--text:#1e3a5f;--text2:#2d5282;--text3:#5b7fa6;--accent:#2d5282;--accent2:#1e3a5f;--accentText:#e8f0f8;--card:#f0f5f8;--cardBorder:#b0c8dc;--progress:#2d5282;--grad:linear-gradient(160deg,#e8eef8 0%,#dce6f4 100%); }
body.t11 { --bg:#f4f8fc;--bg2:#e8f0f8;--bg3:#dce8f4;--border:#b0c8e0;--border2:#98b8d8;--text:#2a3a58;--text2:#4a5a78;--text3:#8090b0;--accent:#5a98b8;--accent2:#4080a0;--accentText:#fff;--card:#f8fbff;--cardBorder:#c0d4e8;--progress:#6aaac0;--grad:linear-gradient(160deg,#f0f6fc 0%,#e8f2f8 100%); }
body.t12 { --bg:#2a2530;--bg2:#342e3a;--bg3:#3c3545;--border:#504858;--border2:#605868;--text:#e8e4e0;--text2:#c0b8b0;--text3:#908880;--accent:#b0a090;--accent2:#c8b8a8;--accentText:#2a2530;--card:#322c38;--cardBorder:#504858;--progress:#988070;--grad:linear-gradient(160deg,#2a2530 0%,#302a38 100%); }
body.t13 { --bg:#1a2e4a;--bg2:#22384e;--bg3:#2a4460;--border:#3a5478;--border2:#4a6488;--text:#f0eae4;--text2:#c8b8a8;--text3:#908070;--accent:#6a8aaa;--accent2:#8aaac8;--accentText:#f0eae4;--card:#20344c;--cardBorder:#3a5270;--progress:#5a7a98;--grad:linear-gradient(160deg,#1a2e4a 0%,#1e3456 100%); }
body.t14 { --bg:#f0f0ee;--bg2:#e4e4e0;--bg3:#d8d8d4;--border:#c0b8b0;--border2:#b0a8a0;--text:#3a3530;--text2:#5a5550;--text3:#908880;--accent:#807870;--accent2:#605850;--accentText:#f8f6f4;--card:#f8f8f6;--cardBorder:#ccc8c0;--progress:#908078;--grad:linear-gradient(160deg,#f0f0ee 0%,#e8e8e4 100%); }

body { background: var(--grad); color: var(--text); }

/* ===== LAYOUT ===== */
#app { max-width: 480px; margin: 0 auto; min-height: 100dvh; display: flex; flex-direction: column; }
#header { padding: max(env(safe-area-inset-top,16px),20px) 20px 0; }
#content { flex: 1; overflow-y: auto; padding-bottom: calc(env(safe-area-inset-bottom,0px) + 80px); }

/* ===== HEADER ===== */
.header-inner { padding: 14px 0 10px; border-bottom: 1px solid var(--border); }
.header-app-name { font-family: 'Pacifico', cursive; font-size: 22px; color: var(--accent); letter-spacing: 1px; margin-bottom: 2px; }
.header-subtitle { font-size: 11px; color: var(--text3); letter-spacing: 3px; font-weight: 300; margin-bottom: 10px; }
.header-tabs { display: flex; gap: 16px; }
.tab-btn { font-size: 11px; letter-spacing: 1px; color: var(--text3); padding: 3px 0; border-bottom: 2px solid transparent; transition: all 0.3s; background: none; border-left: none; border-right: none; border-top: none; font-weight: 400; display: flex; align-items: center; gap: 4px; }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-btn i { font-size: 14px; }

/* ===== THEME STRIP ===== */
.theme-strip { display: flex; gap: 6px; padding: 10px 20px; background: var(--bg2); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; align-items: center; }
.theme-swatch { width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; flex-shrink: 0; transition: transform 0.2s, border-color 0.2s; overflow: hidden; }
.theme-swatch.active { border-color: var(--text); transform: scale(1.2); box-shadow: 0 2px 8px rgba(0,0,0,0.18); }
.auto-swatch { display: flex; align-items: center; justify-content: center; background: var(--bg3); border: 2px solid var(--border2); color: var(--text2); font-size: 13px; }

/* ===== TIMER BANNER ===== */
.timer-banner { background: var(--bg2); border-bottom: 2px solid var(--accent); padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; }
.timer-label { font-family: 'Pacifico', cursive; font-size: 10px; color: var(--accent); letter-spacing: 1px; }
.timer-display { font-family: 'Pacifico', cursive; font-size: 24px; color: var(--accent); letter-spacing: 2px; }
.timer-skill-nm { font-size: 11px; color: var(--text2); margin-top: 2px; display: flex; align-items: center; gap: 5px; }
.btn-stop { background: var(--accent); color: var(--accentText); padding: 9px 14px; border-radius: 20px; font-size: 11px; font-weight: 700; display: flex; align-items: center; gap: 5px; }
.btn-stop i { font-size: 14px; }

/* ===== INSTALL BAR ===== */
.install-bar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 9px 20px; display: flex; align-items: center; justify-content: space-between; }
.install-txt { font-size: 11px; color: var(--text2); display: flex; align-items: center; gap: 6px; }
.install-btn { background: var(--accent); color: var(--accentText); padding: 5px 12px; border-radius: 14px; font-size: 11px; font-weight: 700; }
.install-x { color: var(--text3); font-size: 18px; padding: 0 4px; }

/* ===== SKILL CARDS ===== */
.skill-card { background: var(--card); border: 1px solid var(--cardBorder); border-radius: 14px; padding: 14px; margin-bottom: 10px; cursor: pointer; transition: box-shadow 0.2s, border-color 0.2s; position: relative; overflow: hidden; }
.skill-card:active { opacity: 0.82; }
.skill-card.done { border-color: var(--accent); }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.card-left { display: flex; align-items: center; gap: 10px; }
.sk-icon { width: 40px; height: 40px; border-radius: 10px; background: var(--bg2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.sk-icon i { font-size: 20px; color: var(--accent); }
.sk-name { font-weight: 500; font-size: 14px; color: var(--text); }
.sk-lv { font-size: 10px; margin-top: 2px; color: var(--text3); letter-spacing: 1px; }
.sk-h { font-family: 'Pacifico', cursive; font-size: 18px; text-align: right; }
.sk-goal { font-size: 9px; color: var(--text3); margin-top: 1px; text-align: right; }
.prog-track { background: var(--border); border-radius: 3px; height: 4px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
.card-foot { display: flex; justify-content: space-between; margin-top: 5px; }
.card-foot span { font-size: 9px; color: var(--text3); letter-spacing: 1px; }
.done-mark { position: absolute; top: 10px; right: 10px; color: var(--accent); font-size: 16px; }

/* ===== BUTTONS ===== */
.btn-primary { width: 100%; padding: 13px; background: var(--accent); color: var(--accentText); border-radius: 24px; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 6px; transition: opacity 0.2s; }
.btn-primary:disabled { opacity: 0.35; cursor: default; }
.btn-primary i { font-size: 16px; }
.btn-sec { flex: 1; padding: 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; color: var(--accent); font-size: 12px; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 5px; }
.btn-sec i { font-size: 15px; }
.btn-danger { background: none; color: #b05050; font-size: 11px; display: flex; align-items: center; gap: 4px; }
.btn-danger i { font-size: 14px; }
.btn-back { background: none; color: var(--accent); font-size: 12px; display: flex; align-items: center; gap: 4px; font-weight: 400; }
.btn-back i { font-size: 16px; }
.btn-add { width: 100%; padding: 14px; background: var(--bg2); border: 1.5px dashed var(--border2); border-radius: 14px; color: var(--text3); font-size: 13px; letter-spacing: 1px; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-add i { font-size: 18px; color: var(--accent); }

/* ===== DETAIL ===== */
.detail-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
.detail-hero { text-align: center; margin-bottom: 18px; }
.d-icon { width: 72px; height: 72px; border-radius: 20px; background: var(--bg2); border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; }
.d-icon i { font-size: 36px; color: var(--accent); }
.d-name { font-weight: 700; font-size: 19px; color: var(--text); margin-bottom: 4px; }
.d-lv { font-size: 10px; letter-spacing: 3px; color: var(--text3); }
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.stat-c { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 11px; }
.stat-l { font-size: 9px; color: var(--text3); margin-bottom: 3px; letter-spacing: 2px; }
.stat-v { font-family: 'Pacifico', cursive; font-size: 15px; color: var(--text); }
.action-row { display: flex; gap: 8px; margin-bottom: 18px; }
.sess-item { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); }
.sess-t { font-family: 'Pacifico', cursive; font-size: 13px; color: var(--accent); }
.sess-n { font-size: 10px; color: var(--text3); margin-top: 2px; }
.sess-d { font-size: 10px; color: var(--text3); }
.sec-label { font-family: 'Pacifico', cursive; font-size: 11px; color: var(--text3); margin-bottom: 8px; }

/* ===== COMPLETE BANNER ===== */
.done-banner { border: 1px solid var(--accent); border-radius: 14px; padding: 14px; margin-bottom: 18px; text-align: center; background: var(--bg2); }
.done-banner-ic { font-size: 28px; margin-bottom: 4px; color: var(--accent); }
.done-banner-tt { font-family: 'Pacifico', cursive; font-size: 14px; color: var(--accent); margin-bottom: 4px; }
.done-banner-sb { font-size: 11px; color: var(--text3); margin-bottom: 12px; }
.done-actions { display: flex; gap: 8px; }
.btn-hall { flex: 1; padding: 10px; background: var(--accent); color: var(--accentText); border-radius: 18px; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 5px; }
.btn-hall i { font-size: 14px; }
.btn-ext { flex: 1; padding: 10px; background: var(--bg); border: 1px solid var(--accent); border-radius: 18px; color: var(--accent); font-size: 11px; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 5px; }
.btn-ext i { font-size: 14px; }

/* ===== FORM ===== */
.form-label { font-family: 'Pacifico', cursive; font-size: 10px; color: var(--text3); letter-spacing: 1px; display: block; margin-bottom: 6px; }
.form-input { width: 100%; background: var(--bg2); border: 1px solid var(--border); color: var(--text); padding: 10px 12px; border-radius: 10px; font-size: 13px; }
.chip-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.chip { padding: 5px 12px; font-size: 10px; border-radius: 14px; border: 1px solid var(--border); color: var(--text2); background: var(--bg2); cursor: pointer; transition: all 0.15s; letter-spacing: 1px; }
.chip.active { background: var(--accent); color: var(--accentText); border-color: var(--accent); }

/* Icon picker grid */
.icon-grid { display: grid; grid-template-columns: repeat(6,1fr); gap: 8px; }
.icon-btn { aspect-ratio: 1; border-radius: 10px; background: var(--bg2); border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; }
.icon-btn i { font-size: 20px; color: var(--text2); transition: color 0.15s; }
.icon-btn.active { background: var(--bg3); border-color: var(--accent); }
.icon-btn.active i { color: var(--accent); }

/* ===== HALL ===== */
.hall-card { background: var(--card); border: 1px solid var(--accent); border-radius: 14px; padding: 14px; margin-bottom: 10px; position: relative; overflow: hidden; }
.hall-inner { display: flex; align-items: center; gap: 12px; }
.hall-icon { width: 48px; height: 48px; border-radius: 12px; background: var(--bg2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.hall-icon i { font-size: 24px; color: var(--accent); }
.hall-info { flex: 1; }
.hall-nm { font-weight: 700; font-size: 14px; color: var(--accent); }
.hall-sb { font-size: 10px; color: var(--text2); margin-top: 2px; letter-spacing: 1px; }
.hall-dt { font-size: 10px; color: var(--text3); }
.hall-h { font-family: 'Pacifico', cursive; font-size: 20px; color: var(--accent); text-align: right; }
.hall-sc { font-size: 9px; color: var(--text3); text-align: right; letter-spacing: 1px; }
.hall-bg { position: absolute; top: -8px; right: -8px; font-size: 56px; opacity: 0.05; color: var(--accent); }

/* ===== MODAL ===== */
.modal-ov { position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 998; display: flex; align-items: center; justify-content: center; padding: 24px; backdrop-filter: blur(4px); }
.modal-box { background: var(--bg2); border: 1px solid var(--border2); border-radius: 18px; padding: 22px; width: 100%; max-width: 340px; }
.modal-title { font-family: 'Pacifico', cursive; font-size: 14px; color: var(--accent); margin-bottom: 14px; }
.modal-row { display: flex; gap: 8px; margin-top: 18px; }
.modal-cancel { flex: 1; padding: 11px; background: var(--bg); border: 1px solid var(--border); border-radius: 18px; color: var(--text2); }
.modal-ok { flex: 1; padding: 11px; background: var(--accent); border: none; border-radius: 18px; color: var(--accentText); font-weight: 700; }

/* ===== CELEBRATION ===== */
.celebration { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 32px; backdrop-filter: blur(5px); }
.cel-icon { width: 96px; height: 96px; border-radius: 28px; background: var(--bg2); border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; animation: bounceIcon 0.7s infinite alternate; }
.cel-icon i { font-size: 48px; color: var(--accent); }
.cel-tag { font-family: 'Pacifico', cursive; font-size: 11px; letter-spacing: 2px; color: var(--accent2,#aaa); margin-bottom: 6px; }
.cel-title { font-family: 'Pacifico', cursive; font-size: 26px; color: #f0ede8; margin-bottom: 8px; }
.cel-sub { font-size: 15px; color: #ccc; margin-bottom: 20px; line-height: 1.6; }
.cel-hint { font-size: 10px; color: #666; letter-spacing: 2px; }
@keyframes bounceIcon { from { transform: scale(1) rotate(-3deg); } to { transform: scale(1.08) rotate(3deg); } }

/* ===== EMPTY ===== */
.empty { text-align: center; padding: 52px 20px; color: var(--text3); }
.empty-icon { font-size: 48px; margin-bottom: 12px; color: var(--border2); }
.empty-txt { font-size: 13px; line-height: 1.7; }

/* ===== CIRCLE SVG ===== */
.circle-wrap { display: flex; justify-content: center; margin-bottom: 18px; }

/* ===== MISC ===== */
#confetti-canvas { position: fixed; top:0;left:0;width:100%;height:100%; pointer-events:none; z-index:1000; }
.pad { padding: 14px 20px; }
.mb8{margin-bottom:8px} .mb12{margin-bottom:12px} .mb16{margin-bottom:16px} .mb18{margin-bottom:18px} .mb20{margin-bottom:20px}
.hidden { display: none !important; }
</style>
</head>
<body class="t1">
<canvas id="confetti-canvas" class="hidden"></canvas>

<div id="app">
  <div id="header">
    <div class="header-inner">
      <div class="header-app-name">Mastery Tracker</div>
      <div class="header-subtitle">習熟時間記録</div>
      <div class="header-tabs">
        <button class="tab-btn active" onclick="switchView('list')" id="tab-list">
          <i class="ph ph-list-checks"></i> スキル一覧
        </button>
        <button class="tab-btn" onclick="switchView('hall')" id="tab-hall">
          <i class="ph ph-trophy"></i> 殿堂 (0)
        </button>
      </div>
    </div>
  </div>

  <!-- Theme strip -->
  <div class="theme-strip" id="theme-strip">
    <button class="theme-swatch auto-swatch active" id="sw-auto" onclick="selectTheme('auto')" title="自動">
      <i class="ph ph-clock"></i>
    </button>
  </div>

  <!-- Install bar -->
  <div class="install-bar hidden" id="install-bar">
    <div class="install-txt"><i class="ph ph-device-mobile" style="font-size:15px"></i> ホーム画面に追加できます</div>

// ===== THEMES =====
const THEMES = [

function getAutoTheme() {

let data = { skills:[], hall:[], theme:'auto' };
let currentSkillId = null;
let timerInterval = null, timerSeconds = 0, timerSkillId = null;

const MASTERY_LEVELS = [
  {pct:0,   label:'Beginner',    jp:'見習い'},
  {pct:10,  label:'Novice',      jp:'初級者'},
  {pct:25,  label:'Intermediate',jp:'中級者'},
  {pct:50,  label:'Advanced',    jp:'上級者'},

  {pct:90,  label:'Master',      jp:'マスター'},
  {pct:100, label:'Legend',      jp:'達人'},
];

function fmtTime(m){ const h=Math.floor(m/60),mm=m%60; if(!h)return mm+'分'; if(!mm)return h+'時間'; return h+'時間'+mm+'分'; }
function fmtH(m){ return (m/60).toFixed(1); }
function getLevel(pct){ let l=MASTERY_LEVELS[0]; MASTERY_LEVELS.forEach(x=>{if(pct>=x.pct)l=x;}); return l; }

// ===== IndexedDB DATA LAYER =====
const DB_NAME = 'mastery-pwa';
const DB_VERSION = 1;
const STORE = 'appdata';
const DATA_KEY = 'main';

let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      e.target.result.createObjectStore(STORE);
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror = () => reject(req.error);
  });
}

function idbGet(key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function idbSet(key, value) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    const req = tx.objectStore(STORE).put(value, key);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

async function loadData() {
  try {
    await openDB();
    const saved = await idbGet(DATA_KEY);
    if (saved) {
      data = saved;
    }
    // Migrate from localStorage if IndexedDB is empty
    if (!saved) {
      try {
        const old = localStorage.getItem('mastery-pwa-v4');
        if (old) {
          data = JSON.parse(old);
          await saveData(); // persist to IndexedDB
        }
      } catch(e) {}
    }
  } catch(e) {
    // Fallback to localStorage if IndexedDB fails
    try {
      const r = localStorage.getItem('mastery-pwa-v4');
      if (r) data = JSON.parse(r);
    } catch(e2) {}
  }
  data.skills = data.skills || [];
  data.hall   = data.hall   || [];
  data.theme  = data.theme  || 'auto';
}

async function saveData() {
  try {
    await idbSet(DATA_KEY, data);
  } catch(e) {
    // Fallback to localStorage
    try { localStorage.setItem('mastery-pwa-v4', JSON.stringify(data)); } catch(e2) {}
  }
}

// ===== THEME =====
function applyTheme(id){ document.body.className = id==='auto'? getAutoTheme() : id; }
function selectTheme(id){
  data.theme=id; applyTheme(id); saveData();
  document.querySelectorAll('.theme-swatch').forEach(d=>d.classList.remove('active'));
  const sw=document.getElementById('sw-'+id); if(sw) sw.classList.add('active');
}
function buildThemeStrip(){
  const strip=document.getElementById('theme-strip');
  THEMES.forEach(t=>{
    const btn=document.createElement('button');
    btn.className='theme-swatch'; btn.id='sw-'+t.id; btn.onclick=()=>selectTheme(t.id);
    const [c1,c2,c3,c4]=t.colors;
    btn.style.background=`linear-gradient(135deg,${c1} 25%,${c2} 25%,${c2} 50%,${c3} 50%,${c3} 75%,${c4} 75%)`;
    strip.appendChild(btn);
  });
}

// ===== DETAIL =====
function openDetail(id){ currentSkillId=id; switchView('detail'); }
function renderDetail(){
  const sk=data.skills.find(s=>s.id===currentSkillId); if(!sk) return switchView('list');
  const pct=Math.min(100,(sk.totalMinutes/sk.goalMinutes)*100);
  const lv=getLevel(pct); const done=sk.totalMinutes>=sk.goalMinutes;
  const remaining=Math.max(0,sk.goalMinutes-sk.totalMinutes);
  const C=2*Math.PI*66; const dash=C*(1-pct/100);
  const doneBanner=done?`<div class="done-banner">
    <div class="done-banner-ic"><i class="ph ph-seal-check"></i></div>
    <div class="done-banner-tt">目標達成おめでとうございます！</div>

      <div class="d-lv">${lv.label} · ${lv.jp}</div>

    <div class="circle-wrap"><svg width="156" height="156" viewBox="0 0 156 156">
      <circle cx="78" cy="78" r="66" fill="none" stroke="var(--border)" stroke-width="8"/>
      <circle cx="78" cy="78" r="66" fill="none" stroke="var(--accent)" stroke-width="8" stroke-dasharray="${C}" stroke-dashoffset="${dash}" stroke-linecap="round" transform="rotate(-90 78 78)" style="transition:stroke-dashoffset 0.8s ease"/>

    </svg></div>
    <div class="stats-grid">
      <div class="stat-c"><div class="stat-l">目標</div><div class="stat-v">${(sk.goalMinutes/60).toLocaleString()}<span style="font-size:10px;font-family:'Noto Sans JP'">h</span></div></div>
      <div class="stat-c"><div class="stat-l">${done?'超過':'残り'}</div><div class="stat-v">${done?'+'+fmtH(sk.totalMinutes-sk.goalMinutes)+'h':fmtTime(remaining)}</div></div>

}

function selIcon(key,btn){ selectedIconKey=key; document.querySelectorAll('.icon-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
function selGoal(h,btn){ document.getElementById('new-goal').value=h; document.querySelectorAll('#goal-chips .chip').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
function updateAddBtn(){ document.getElementById('add-btn').disabled=!document.getElementById('new-name').value.trim(); }
function addSkill(){
  const name=document.getElementById('new-name').value.trim(), gh=Number(document.getElementById('new-goal').value);
  if(!name||!gh) return;
  data.skills.push({id:Date.now().toString(),name,icon:selectedIconKey,goalMinutes:gh*60,totalMinutes:0,sessions:[],createdAt:Date.now()});

}
function selMin(m,btn){ document.getElementById('log-minutes').value=m; document.querySelectorAll('#minute-chips .chip').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
function submitLog(){ const m=Number(document.getElementById('log-minutes').value),note=document.getElementById('log-note').value.trim(); if(!m)return; logSession(currentSkillId,m,note); switchView('detail'); }
function logSession(skillId,minutes,note){
  const sk=data.skills.find(s=>s.id===skillId); if(!sk) return;
  const was=sk.totalMinutes<sk.goalMinutes;
  sk.totalMinutes+=minutes; sk.sessions.unshift({id:Date.now().toString(),minutes,note,date:Date.now()});
  saveData();
  if(was&&sk.totalMinutes>=sk.goalMinutes) triggerCel(sk);
}

// ===== TIMER =====
function startTimer(skillId){
  timerSkillId=skillId; timerSeconds=0;
  const sk=data.skills.find(s=>s.id===skillId);
  document.getElementById('timer-skill-nm').innerHTML=`${iconEl(sk?.icon||'target',13)} ${sk?.name||''}`;
  document.getElementById('timer-banner').classList.remove('hidden');
  timerInterval=setInterval(()=>{
    timerSeconds++;
    const h=String(Math.floor(timerSeconds/3600)).padStart(2,'0'),m=String(Math.floor((timerSeconds%3600)/60)).padStart(2,'0'),s=String(timerSeconds%60).padStart(2,'0');
    document.getElementById('timer-display').textContent=`${h}:${m}:${s}`;
  },1000);
  renderDetail();
}
function stopTimer(){
  clearInterval(timerInterval); timerInterval=null;
  const el=Math.floor(timerSeconds/60);
  document.getElementById('timer-banner').classList.add('hidden');
  if(el>0) logSession(timerSkillId,el,'タイマー記録');
  timerSeconds=0; timerSkillId=null; renderDetail();
}

// ===== HALL =====
function moveToHall(skillId){
  const sk=data.skills.find(s=>s.id===skillId); if(!sk) return;
  data.hall.unshift({id:Date.now().toString(),name:sk.name,icon:sk.icon||'target',goalMinutes:sk.goalMinutes,totalMinutes:sk.totalMinutes,sessions:sk.sessions.length,achievedAt:Date.now()});
  data.skills=data.skills.filter(s=>s.id!==skillId); saveData(); switchView('hall');
}

// ===== EXTEND =====
function openExtend(skillId,curMin){ currentSkillId=skillId; const cur=curMin/60; const opts=[cur*2,cur*3,20000].filter((v,i,a)=>a.indexOf(v)===i); document.getElementById('extend-chips').innerHTML=opts.map(h=>`<button class="chip" onclick="setExtH(${h},this)">${h.toLocaleString()}h</button>`).join(''); document.getElementById('extend-hours').value=opts[0]; document.getElementById('extend-modal').classList.remove('hidden'); }
function setExtH(h,btn){ document.getElementById('extend-hours').value=h; document.querySelectorAll('#extend-chips .chip').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
function closeExtend(){ document.getElementById('extend-modal').classList.add('hidden'); }
function confirmExtend(){ const h=Number(document.getElementById('extend-hours').value),sk=data.skills.find(s=>s.id===currentSkillId); if(sk&&h){sk.goalMinutes=h*60;saveData();} closeExtend(); renderDetail(); }

// ===== CELEBRATION =====
function triggerCel(sk){
  const found=SKILL_ICONS.find(x=>x.key===(sk.icon||'target'))||SKILL_ICONS[0];
  document.getElementById('cel-ph-icon').className=`ph ${found.ph}`;
  document.getElementById('cel-text').textContent=`「${sk.name}」\nを習熟しました`;
  document.getElementById('celebration').classList.remove('hidden');
  launchConfetti();
}
function closeCelebration(){ document.getElementById('celebration').classList.add('hidden'); }

// ===== CONFETTI =====
function launchConfetti(){
  const canvas=document.getElementById('confetti-canvas');
  canvas.classList.remove('hidden'); canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  const ctx=canvas.getContext('2d');
  const cols=['#c47878','#a8c0b8','#7090c0','#4a7a6a','#a09080','#8bc34a','#f8f4f0','#1e3a5f','#c4877a','#70a8b8'];
  const ps=Array.from({length:120},()=>({x:Math.random()*canvas.width,y:-20,r:Math.random()*5+3,color:cols[Math.floor(Math.random()*cols.length)],vx:(Math.random()-.5)*3.5,vy:Math.random()*3.5+1.5,rot:Math.random()*360,rotV:(Math.random()-.5)*7,shape:Math.random()>.5?'rect':'circle'}));
  let fr=0;
  function draw(){ ctx.clearRect(0,0,canvas.width,canvas.height); ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.rot+=p.rotV;p.vy+=.04;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.color;ctx.globalAlpha=Math.max(0,1-fr/180);if(p.shape==='rect')ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);else{ctx.beginPath();ctx.arc(0,0,p.r,0,Math.PI*2);ctx.fill();}ctx.restore();}); fr++; if(fr<200)requestAnimationFrame(draw); else canvas.classList.add('hidden'); }
  requestAnimationFrame(draw);
}

// ===== PWA =====
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('install-bar').classList.remove('hidden');});
document.getElementById('install-btn').addEventListener('click',async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;document.getElementById('install-bar').classList.add('hidden');});
const mf={name:'習熟 Tracker',short_name:'習熟',display:'standalone',background_color:'#f8f4f0',theme_color:'#c47878',orientation:'portrait',start_url:'./',icons:[{src:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23c47878'/><text y='.9em' font-size='62' x='19'>🎯</text></svg>",sizes:'512x512',type:'image/svg+xml'}]};
document.getElementById('manifest-link').href=URL.createObjectURL(new Blob([JSON.stringify(mf)],{type:'application/json'}));
if('serviceWorker' in navigator){const sw=`const C='mt-v4';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll(['.']))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('.')))));`;navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});}

// ===== INIT =====
loadData().then(() => {
  buildThemeStrip();
  applyTheme(data.theme);
  const asw=document.getElementById('sw-'+data.theme);
  if(asw){document.querySelectorAll('.theme-swatch').forEach(d=>d.classList.remove('active'));asw.classList.add('active');}
  renderList();
  setInterval(()=>{if(data.theme==='auto')applyTheme('auto');},60000);
});
