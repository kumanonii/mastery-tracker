<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

/* ===== BASE FONTS ===== */
body { font-family: 'DM Sans','Noto Sans JP',sans-serif; font-weight: 300; min-height: 100dvh; transition: background 1.4s ease, color 0.8s ease; overflow-x: hidden; }
body.lang-ja { font-family: 'DM Sans','Noto Sans JP',sans-serif; }
body.lang-en { font-family: 'DM Sans',sans-serif; }
body.lang-pt { font-family: 'DM Sans',sans-serif; }
body.lang-zh { font-family: 'DM Sans','Noto Sans TC',sans-serif; }
body.lang-ko { font-family: 'DM Sans','Noto Sans KR',sans-serif; }

/* Display font via CSS variable */
:root { --font-display: 'Pacifico', cursive; --font-display-weight: 400; }
body.lang-ja, body.lang-zh { --font-display: 'Zen Maru Gothic', sans-serif; --font-display-weight: 700; }
body.lang-ko { --font-display: 'Jua', sans-serif; --font-display-weight: 400; }
.font-display { font-family: var(--font-display); font-weight: var(--font-display-weight); }

/* Apply display font to all headings/labels */
.header-app-name,
.header-subtitle,
.timer-label,
.timer-display,
.tab-btn,
.sk-h,
.sk-goal,
.stat-v,
.sec-label,
.form-label,
.modal-title,
.cel-tag,
.cel-title,
.done-banner-tt,
.hall-h,
.weekly-val,
.forecast-pace,
.sess-t,
.d-lv,
.weekly-lbl,
.goal-chip-h,
[data-display] {
  font-family: 'Pacifico', cursive;
}
body.lang-ja .timer-display, body.lang-zh .timer-display,
body.lang-ja .stat-v, body.lang-zh .stat-v,
body.lang-ja .sec-label, body.lang-zh .sec-label,
body.lang-ja .form-label, body.lang-zh .form-label,
body.lang-ja .modal-title, body.lang-zh .modal-title,
body.lang-ja .cel-title, body.lang-zh .cel-title,
body.lang-ja .done-banner-tt, body.lang-zh .done-banner-tt,
body.lang-ja .hall-h, body.lang-zh .hall-h,
body.lang-ja .weekly-val, body.lang-zh .weekly-val,
body.lang-ja .forecast-pace, body.lang-zh .forecast-pace,
body.lang-ja .sess-t, body.lang-zh .sess-t,
body.lang-ja .sk-h, body.lang-zh .sk-h,
body.lang-ja .goal-chip-h, body.lang-zh .goal-chip-h,
body.lang-ja .timer-label, body.lang-zh .timer-label
{ font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700; }

body.lang-ko .timer-display,
body.lang-ko .stat-v,
body.lang-ko .sec-label,
body.lang-ko .form-label,
body.lang-ko .modal-title,
body.lang-ko .cel-title,
body.lang-ko .done-banner-tt,
body.lang-ko .hall-h,
body.lang-ko .weekly-val,
body.lang-ko .forecast-pace,
body.lang-ko .sess-t,
body.lang-ko .sk-h,
body.lang-ko .goal-chip-h,
body.lang-ko .timer-label
{ font-family: 'Jua', sans-serif; }

input, button { font-family: inherit; }
button { cursor: pointer; border: none; background: none; }
input { outline: none; border: none; }
::-webkit-scrollbar { display: none; }

/* ===== THEMES ===== */
body.t1  { --bg:#f8f4f0;--bg2:#f0e8e2;--bg3:#ecddd5;--border:#d4c4b0;--border2:#c8b4a0;--text:#5a3a2a;--text2:#8a6050;--text3:#b89880;--accent:#c47878;--accent2:#a05858;--accentText:#fff;--card:#fdfaf7;--cardBorder:#ddd0c0;--grad:linear-gradient(160deg,#f8f4f0 0%,#f0e4dc 100%); }
body.t2  { --bg:#f5f0ee;--bg2:#ede5e0;--bg3:#e8dcd6;--border:#d4c0b8;--border2:#c8b0a8;--text:#5a3a35;--text2:#8a6058;--text3:#b89888;--accent:#c4877a;--accent2:#a06860;--accentText:#fff;--card:#faf7f5;--cardBorder:#dcccc4;--grad:linear-gradient(160deg,#f5f0ee 0%,#ede0da 100%); }
body.t3  { --bg:#f8f5e8;--bg2:#f0edd8;--bg3:#e8e4cc;--border:#d0c8a8;--border2:#c0b898;--text:#4a4030;--text2:#7a6a50;--text3:#a89878;--accent:#a8c0b8;--accent2:#7a9c90;--accentText:#2a3c38;--card:#fdfbf0;--cardBorder:#d8d0b0;--grad:linear-gradient(160deg,#f8f5e8 0%,#ede8d0 100%); }
body.t4  { --bg:#f0f8f8;--bg2:#e4f0f0;--bg3:#d8e8e8;--border:#b0d0d8;--border2:#98c0ca;--text:#2a4048;--text2:#4a6878;--text3:#789098;--accent:#70a8b8;--accent2:#4a8898;--accentText:#fff;--card:#f8fcfc;--cardBorder:#c0d8e0;--grad:linear-gradient(160deg,#eef7f8 0%,#ddeef2 100%); }
body.t5  { --bg:#f4f8f0;--bg2:#e8f0e4;--bg3:#dce8d8;--border:#b8d4b0;--border2:#a0c498;--text:#2a4025;--text2:#4a6845;--text3:#7a9870;--accent:#6a9a35;--accent2:#508025;--accentText:#fff;--card:#f8fcf5;--cardBorder:#c8dcc0;--grad:linear-gradient(160deg,#f0f8ec 0%,#e4f0dc 100%); }
body.t6  { --bg:#f0f4f0;--bg2:#e4ece4;--bg3:#d8e4d8;--border:#a8c8b8;--border2:#90b8a8;--text:#2a4035;--text2:#4a6855;--text3:#789878;--accent:#4a7a6a;--accent2:#3a6058;--accentText:#f0f8f4;--card:#f5f8f5;--cardBorder:#bcd4c8;--grad:linear-gradient(160deg,#edf4ef 0%,#ddeae2 100%); }
body.t7  { --bg:#1a3a1a;--bg2:#243a24;--bg3:#2a4a2a;--border:#3a5a3a;--border2:#4a6a4a;--text:#e8f4e8;--text2:#b0d0b0;--text3:#7aa07a;--accent:#7a9a5a;--accent2:#6a8a48;--accentText:#e8f4e8;--card:#223422;--cardBorder:#3a5a38;--grad:linear-gradient(160deg,#1a3a1a 0%,#243824 100%); }
body.t8  { --bg:#f5ede8;--bg2:#ede0d8;--bg3:#e0d0c4;--border:#b8a898;--border2:#a89888;--text:#1e3a5f;--text2:#2d5282;--text3:#5b7fa6;--accent:#1e3a5f;--accent2:#4a6a8a;--accentText:#f5ede8;--card:#faf5f0;--cardBorder:#cbbda8;--grad:linear-gradient(160deg,#f5ede8 0%,#e8ddd0 100%); }
body.t9  { --bg:#f5f0e8;--bg2:#ece8d8;--bg3:#e0dac8;--border:#c0b898;--border2:#b0a888;--text:#2a3a58;--text2:#4a5a78;--text3:#7890b0;--accent:#7090c0;--accent2:#5070a0;--accentText:#fff;--card:#faf8f2;--cardBorder:#ccc4a8;--grad:linear-gradient(160deg,#f5f0e8 0%,#eae4d4 100%); }
body.t10 { --bg:#e8eef4;--bg2:#dce4ee;--bg3:#d0dae8;--border:#a0b8d0;--border2:#88a8c8;--text:#1e3a5f;--text2:#2d5282;--text3:#5b7fa6;--accent:#2d5282;--accent2:#1e3a5f;--accentText:#e8f0f8;--card:#f0f5f8;--cardBorder:#b0c8dc;--grad:linear-gradient(160deg,#e8eef8 0%,#dce6f4 100%); }
body.t11 { --bg:#f4f8fc;--bg2:#e8f0f8;--bg3:#dce8f4;--border:#b0c8e0;--border2:#98b8d8;--text:#2a3a58;--text2:#4a5a78;--text3:#8090b0;--accent:#5a98b8;--accent2:#4080a0;--accentText:#fff;--card:#f8fbff;--cardBorder:#c0d4e8;--grad:linear-gradient(160deg,#f0f6fc 0%,#e8f2f8 100%); }
body.t12 { --bg:#2a2530;--bg2:#342e3a;--bg3:#3c3545;--border:#504858;--border2:#605868;--text:#e8e4e0;--text2:#c0b8b0;--text3:#908880;--accent:#b0a090;--accent2:#c8b8a8;--accentText:#2a2530;--card:#322c38;--cardBorder:#504858;--grad:linear-gradient(160deg,#2a2530 0%,#302a38 100%); }
body.t13 { --bg:#1a2e4a;--bg2:#22384e;--bg3:#2a4460;--border:#3a5478;--border2:#4a6488;--text:#f0eae4;--text2:#c8b8a8;--text3:#908070;--accent:#6a8aaa;--accent2:#8aaac8;--accentText:#f0eae4;--card:#20344c;--cardBorder:#3a5270;--grad:linear-gradient(160deg,#1a2e4a 0%,#1e3456 100%); }
body.t14 { --bg:#f0f0ee;--bg2:#e4e4e0;--bg3:#d8d8d4;--border:#c0b8b0;--border2:#b0a8a0;--text:#3a3530;--text2:#5a5550;--text3:#908880;--accent:#807870;--accent2:#605850;--accentText:#f8f6f4;--card:#f8f8f6;--cardBorder:#ccc8c0;--grad:linear-gradient(160deg,#f0f0ee 0%,#e8e8e4 100%); }
body { background: var(--grad); color: var(--text); }

/* ===== LAYOUT ===== */
#app { max-width: 480px; margin: 0 auto; min-height: 100dvh; display: flex; flex-direction: column; }
#header { padding: max(env(safe-area-inset-top,16px),20px) 20px 0; }
#content { flex: 1; overflow-y: auto; padding-bottom: calc(env(safe-area-inset-bottom,0px) + 80px); }

/* ===== HEADER ===== */
.header-inner { padding: 14px 0 10px; border-bottom: 1px solid var(--border); }
.header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2px; }
.header-app-name { font-size: 22px; color: var(--accent); letter-spacing: 1px; font-family: 'Pacifico', cursive !important; }
.add-section-title { color: var(--accent); font-family: var(--font-display); font-weight: var(--font-display-weight); }
body.lang-ja .add-section-title, body.lang-zh .add-section-title { font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700; }
body.lang-ko .add-section-title { font-family: 'Jua', sans-serif; }
.header-subtitle { font-size: 11px; color: var(--text3); letter-spacing: 3px; font-weight: 300; margin-bottom: 10px; font-family: 'DM Sans', sans-serif; }
.header-tabs { display: flex; gap: 16px; }
.tab-btn { font-size: 11px; letter-spacing: 1px; color: var(--text3); padding: 3px 0; border-bottom: 2px solid transparent; transition: all 0.3s; background: none; border-left: none; border-right: none; border-top: none; font-weight: 400; display: flex; align-items: center; gap: 4px; font-family: 'DM Sans','Noto Sans JP','Noto Sans TC','Noto Sans KR',sans-serif; }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-btn i { font-size: 14px; }

/* ===== LANG SWITCHER ===== */
.lang-switcher { display: flex; gap: 3px; align-items: center; flex-shrink: 0; }
.lang-btn { font-size: 10px; padding: 3px 6px; border-radius: 8px; color: var(--text3); background: none; border: 1px solid transparent; cursor: pointer; transition: all 0.2s; line-height: 1.4; font-family: 'DM Sans','Noto Sans JP','Noto Sans TC','Noto Sans KR',sans-serif; }
.lang-btn.active { background: var(--accent); color: var(--accentText); border-color: var(--accent); }

/* ===== PALETTE BUTTON ===== */
.palette-btn { width: 32px; height: 32px; border-radius: 10px; background: var(--bg2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--text2); font-size: 16px; cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
.palette-btn.open { background: var(--accent); color: var(--accentText); border-color: var(--accent); }

/* ===== THEME STRIP ===== */
.theme-strip-wrap { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; background: var(--bg2); border-bottom: none; }
.theme-strip-wrap.open { max-height: 60px; border-bottom: 1px solid var(--border); }
.theme-strip { display: flex; gap: 6px; padding: 10px 20px; overflow-x: auto; overflow-y: visible; scrollbar-width: none; -webkit-overflow-scrolling: touch; align-items: center; white-space: nowrap; }
.theme-strip::-webkit-scrollbar { display: none; }
.theme-swatch { width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; flex-shrink: 0; transition: transform 0.2s, border-color 0.2s; overflow: hidden; }
.theme-swatch.active { border-color: var(--text); transform: scale(1.2); box-shadow: 0 2px 8px rgba(0,0,0,0.18); }
.auto-swatch { display: flex; align-items: center; justify-content: center; background: var(--bg3); border: 2px solid var(--border2); color: var(--text2); font-size: 13px; }

/* ===== TIMER BANNER ===== */
.timer-banner { background: var(--bg2); border-bottom: 2px solid var(--accent); padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; }
.timer-label { font-size: 10px; color: var(--accent); letter-spacing: 1px; }
.timer-display { font-size: 24px; color: var(--accent); letter-spacing: 2px; }
.timer-skill-nm { font-size: 11px; color: var(--text2); margin-top: 2px; display: flex; align-items: center; gap: 5px; }
.btn-stop { background: var(--accent); color: var(--accentText); padding: 9px 14px; border-radius: 20px; font-size: 11px; font-weight: 700; display: flex; align-items: center; gap: 5px; }

/* ===== INSTALL BAR ===== */
.install-bar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 9px 20px; display: flex; align-items: center; justify-content: space-between; }
.install-txt { font-size: 11px; color: var(--text2); display: flex; align-items: center; gap: 6px; }
.install-btn { background: var(--accent); color: var(--accentText); padding: 5px 12px; border-radius: 14px; font-size: 11px; font-weight: 700; }
.install-x { color: var(--text3); font-size: 18px; padding: 0 4px; }

/* ===== SORT BAR ===== */
.sort-bar { display: flex; gap: 6px; padding: 10px 0 4px; align-items: center; flex-wrap: wrap; }
.sort-bar span { font-size: 10px; color: var(--text3); letter-spacing: 1px; }
.sort-chip { font-size: 10px; padding: 3px 10px; border-radius: 12px; border: 1px solid var(--border); color: var(--text3); background: var(--bg2); cursor: pointer; letter-spacing: 0.5px; }
.sort-chip.active { background: var(--accent); color: var(--accentText); border-color: var(--accent); }

/* ===== WEEKLY SUMMARY ===== */
.weekly-bar { background: var(--card); border: 1px solid var(--cardBorder); border-radius: 14px; padding: 12px 14px; margin-bottom: 12px; display: flex; }
.weekly-stat { flex: 1; text-align: center; }
.weekly-stat + .weekly-stat { border-left: 1px solid var(--border); }
.weekly-lbl { font-size: 9px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; font-family: 'DM Sans',sans-serif; }
.weekly-val { font-size: 20px; color: var(--accent); }
.weekly-sub { font-size: 9px; color: var(--text3); font-family: 'DM Sans',sans-serif; }

/* ===== SKILL CARDS ===== */
.skill-card-wrap.dragging { opacity: 0.4; }
.skill-card-wrap.drag-over { border: 2px dashed var(--accent); border-radius: 14px; }
.skill-card-wrap { cursor: grab; }
.skill-card-wrap:active { cursor: grabbing; }
.skill-card { background: var(--card); border: 1px solid var(--cardBorder); border-radius: 14px; padding: 14px; margin-bottom: 10px; cursor: pointer; transition: box-shadow 0.2s; position: relative; overflow: hidden; }
.skill-card:active { opacity: 0.82; }
.skill-card.done { border-color: var(--accent); }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.card-left { display: flex; align-items: center; gap: 10px; }
.sk-icon { width: 40px; height: 40px; border-radius: 10px; background: var(--bg2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.sk-icon i { font-size: 20px; color: var(--accent); }
.sk-name { font-weight: 500; font-size: 14px; color: var(--text); }
.sk-lv { font-size: 10px; margin-top: 2px; color: var(--text3); letter-spacing: 1px; }
.sk-h { font-size: 18px; text-align: right; color: var(--accent); }
.sk-goal { font-size: 9px; color: var(--text3); margin-top: 1px; text-align: right; font-family: 'DM Sans',sans-serif; }
.prog-track { background: var(--border); border-radius: 3px; height: 4px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
.card-foot { display: flex; justify-content: space-between; margin-top: 5px; }
.card-foot span { font-size: 9px; color: var(--text3); letter-spacing: 1px; }
.done-mark { position: absolute; top: 10px; right: 10px; color: var(--accent); font-size: 16px; }

/* ===== BUTTONS ===== */
.btn-primary { width: 100%; padding: 13px; background: var(--accent); color: var(--accentText); border-radius: 24px; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 6px; transition: opacity 0.2s; }
.btn-primary:disabled { opacity: 0.35; cursor: default; }
.btn-primary i { font-size: 16px; }
.btn-sec { flex: 1; padding: 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; color: var(--accent); font-size: 12px; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 5px; }
.btn-sec i { font-size: 15px; }
.btn-danger { background: none; color: #b05050; font-size: 11px; display: flex; align-items: center; gap: 4px; }
.btn-back { background: none; color: var(--accent); font-size: 12px; display: flex; align-items: center; gap: 4px; }
.btn-back i { font-size: 22px; }
.btn-add { width: 100%; padding: 14px; background: var(--bg2); border: 1.5px dashed var(--border2); border-radius: 14px; color: var(--text3); font-size: 13px; letter-spacing: 0.5px; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-add i { font-size: 18px; color: var(--accent); }
.action-icon-btn { flex: 1; height: 64px; border-radius: 20px; background: var(--bg2); border: 1.5px solid var(--border2); color: var(--accent); display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.2s; box-shadow: 0 3px 14px rgba(0,0,0,0.08); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; letter-spacing: 0.3px; }
.action-icon-btn i { font-size: 24px; }
.action-icon-btn:active { opacity: 0.75; transform: scale(0.97); }
.action-icon-btn:disabled { opacity: 0.3; }
.action-icon-btn.primary { background: var(--accent); color: var(--accentText); border-color: var(--accent); box-shadow: 0 4px 18px rgba(0,0,0,0.15); }

/* ===== DETAIL ===== */
.detail-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
.detail-hero { text-align: center; margin-bottom: 18px; }
.d-icon { width: 72px; height: 72px; border-radius: 20px; background: var(--bg2); border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; }
.d-icon i { font-size: 36px; color: var(--accent); }
.d-name { font-weight: 500; font-size: 19px; color: var(--text); margin-bottom: 4px; display: flex; align-items: center; justify-content: center; gap: 6px; }
.d-name i.ph:first-child { font-size: 16px; color: var(--accent); opacity: 0.7; }
.btn-edit-name { color: var(--text3); padding: 2px; }
.btn-edit-name i { font-size: 14px; }
.d-lv { font-size: 10px; letter-spacing: 3px; color: var(--text3); text-transform: uppercase; font-family: 'DM Sans',sans-serif; }
.stat-c { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 11px; }
.stat-l { font-size: 9px; color: var(--text3); margin-bottom: 3px; letter-spacing: 1px; text-transform: uppercase; font-family: 'DM Sans',sans-serif; }
.stat-v { font-size: 15px; color: var(--text); }
.action-row { display: flex; gap: 8px; margin-bottom: 18px; }
.sess-item { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); }

.sec-label { font-size: 11px; color: var(--text3); margin-bottom: 8px; letter-spacing: 1px; }

/* ===== FORECAST ===== */
.forecast-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 14px; }
.forecast-title { font-size: 9px; color: var(--text3); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; font-family: 'DM Sans',sans-serif; }

.forecast-date { font-size: 11px; color: var(--text2); margin-bottom: 12px; }
.forecast-sim-lbl { font-size: 9px; color: var(--text3); letter-spacing: 1px; margin-bottom: 6px; }
.forecast-chips { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 6px; }
.forecast-chip { padding: 4px 10px; font-size: 10px; border-radius: 12px; border: 1px solid var(--border); color: var(--text2); background: var(--bg); cursor: pointer; transition: all 0.15s; }
.forecast-chip.active { background: var(--accent); color: var(--accentText); border-color: var(--accent); }
.forecast-result { font-size: 11px; color: var(--accent); font-weight: 500; min-height: 18px; }

/* ===== COMPLETE BANNER ===== */
.done-banner { border: 1px solid var(--accent); border-radius: 14px; padding: 14px; margin-bottom: 18px; text-align: center; background: var(--bg2); }
.done-banner-ic { font-size: 28px; margin-bottom: 4px; color: var(--accent); }
.done-banner-tt { font-size: 14px; color: var(--accent); margin-bottom: 4px; }
.done-banner-sb { font-size: 11px; color: var(--text3); margin-bottom: 12px; }
.done-actions { display: flex; gap: 8px; }
.btn-hall { flex: 1; padding: 10px; background: var(--accent); color: var(--accentText); border-radius: 18px; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 5px; }
.btn-ext { flex: 1; padding: 10px; background: var(--bg); border: 1px solid var(--accent); border-radius: 18px; color: var(--accent); font-size: 11px; display: flex; align-items: center; justify-content: center; gap: 5px; }

/* ===== FORM ===== */
.form-label { font-size: 10px; color: var(--text3); letter-spacing: 1px; display: block; margin-bottom: 6px; }
.form-input { width: 100%; background: var(--bg2); border: 1px solid var(--border); color: var(--text); padding: 10px 12px; border-radius: 10px; font-size: 13px; font-family: inherit; }
.chip-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.chip { padding: 5px 12px; font-size: 10px; border-radius: 14px; border: 1px solid var(--border); color: var(--text2); background: var(--bg2); cursor: pointer; transition: all 0.15s; letter-spacing: 0.5px; }
.chip.active { background: var(--accent); color: var(--accentText); border-color: var(--accent); }
.goal-chip { display: flex; flex-direction: column; align-items: center; padding: 7px 10px; }
.goal-chip-h { font-size: 15px; line-height: 1.2; }
.goal-chip-lbl { font-size: 8px; opacity: 0.75; margin-top: 2px; font-family: 'DM Sans','Noto Sans JP','Noto Sans TC','Noto Sans KR',sans-serif; }
.icon-grid { display: grid; grid-template-columns: repeat(6,1fr); gap: 8px; }
.icon-btn { aspect-ratio: 1; border-radius: 10px; background: var(--bg2); border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; }
.icon-btn i { font-size: 20px; color: var(--text2); }
.icon-btn.active { background: var(--bg3); border-color: var(--accent); }
.icon-btn.active i { color: var(--accent); }

/* ===== HALL ===== */
.hall-wrap { position: relative; margin-bottom: 10px; border-radius: 14px; overflow: hidden; }
.hall-delete-bg { position: absolute; right: 0; top: 0; bottom: 0; width: 80px; background: #e05050; display: flex; align-items: center; justify-content: center; border-radius: 0 14px 14px 0; }
.hall-delete-bg i { font-size: 22px; color: #fff; }
.hall-card { background: var(--card); border: 1px solid var(--accent); border-radius: 14px; padding: 14px; position: relative; overflow: hidden; touch-action: pan-y; transition: transform 0.25s ease; cursor: pointer; }
.hall-card.swiping { transition: none; }
.hall-inner { display: flex; align-items: center; gap: 12px; }
.hall-icon { width: 48px; height: 48px; border-radius: 12px; background: var(--bg2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.hall-icon i { font-size: 24px; color: var(--accent); }
.hall-info { flex: 1; }
.hall-nm { font-weight: 500; font-size: 14px; color: var(--accent); }
.hall-sb { font-size: 10px; color: var(--text2); margin-top: 2px; }
.hall-dt { font-size: 10px; color: var(--text3); }
.hall-h { font-size: 20px; color: var(--accent); text-align: right; }
.hall-sc { font-size: 9px; color: var(--text3); text-align: right; }
.hall-bg { position: absolute; top: -8px; right: -8px; font-size: 56px; opacity: 0.05; color: var(--accent); }

/* ===== MODAL ===== */
.modal-ov { position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 998; display: flex; align-items: center; justify-content: center; padding: 24px; backdrop-filter: blur(4px); }
.modal-box { background: var(--bg2); border: 1px solid var(--border2); border-radius: 18px; padding: 22px; width: 100%; max-width: 340px; }
.modal-title { font-size: 14px; color: var(--accent); margin-bottom: 14px; }
.modal-row { display: flex; gap: 8px; margin-top: 18px; }
.modal-cancel { flex: 1; padding: 11px; background: var(--bg); border: 1px solid var(--border); border-radius: 18px; color: var(--text2); }
.modal-ok { flex: 1; padding: 11px; background: var(--accent); border: none; border-radius: 18px; color: var(--accentText); font-weight: 700; }

/* ===== UPDATE BANNER ===== */
.update-banner { position: fixed; bottom: calc(env(safe-area-inset-bottom,0px) + 16px); left: 16px; right: 16px; z-index: 999; background: var(--text); color: var(--bg); border-radius: 16px; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.18); transition: transform 0.3s ease, opacity 0.3s ease; }
.update-banner.hidden { transform: translateY(120%); opacity: 0; pointer-events: none; }
.update-banner-text { font-size: 13px; line-height: 1.4; flex: 1; }
.update-banner-text strong { display: block; font-size: 14px; margin-bottom: 2px; }
.update-banner-btn { background: var(--accent); color: var(--accentText); border-radius: 20px; padding: 8px 16px; font-size: 13px; font-weight: 600; white-space: nowrap; border: none; cursor: pointer; }
.update-banner-dismiss { color: var(--bg); opacity: 0.5; font-size: 20px; padding: 4px; flex-shrink: 0; }

/* ===== SETTINGS MODAL ===== */
.settings-modal { position: fixed; inset: 0; z-index: 997; display: flex; flex-direction: column; background: var(--bg); }
.settings-header { padding: max(env(safe-area-inset-top,16px),20px) 20px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.settings-title { font-family: var(--font-display); font-weight: var(--font-display-weight); font-size: 20px; color: var(--accent); }

.settings-close { color: var(--text3); font-size: 22px; padding: 4px; }
.settings-body { flex: 1; overflow-y: auto; padding: 20px; }
.settings-section { margin-bottom: 28px; }
.settings-section-title { font-size: 9px; color: var(--text3); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 12px; }
.settings-row { background: var(--card); border: 1px solid var(--cardBorder); border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.settings-row-label { font-size: 13px; color: var(--text); display: flex; align-items: center; gap: 8px; }
.settings-row-label i { font-size: 17px; color: var(--accent); }
.settings-row-sub { font-size: 10px; color: var(--text3); margin-top: 2px; }
.toggle-switch { position: relative; width: 44px; height: 26px; flex-shrink: 0; }
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; inset: 0; background: var(--border2); border-radius: 13px; transition: 0.3s; cursor: pointer; }
.toggle-slider:before { content:''; position: absolute; width: 20px; height: 20px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.3s; }
input:checked + .toggle-slider { background: var(--accent); }
input:checked + .toggle-slider:before { transform: translateX(18px); }
.time-picker { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 13px; color: var(--text); font-family: inherit; }
.lang-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
.lang-grid-btn { padding: 12px 4px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--bg2); color: var(--text2); font-size: 11px; text-align: center; cursor: pointer; transition: all 0.2s; line-height: 1.3; }
.lang-grid-btn.active { background: var(--accent); color: var(--accentText); border-color: var(--accent); }
.export-btn { width: 100%; padding: 13px; background: var(--bg2); border: 1.5px solid var(--border2); border-radius: 14px; color: var(--accent); font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; }
.export-btn i { font-size: 18px; }

/* ===== WEEK GRAPH ===== */
.week-graph { background: var(--card); border: 1px solid var(--cardBorder); border-radius: 14px; padding: 14px; margin-bottom: 14px; }
.week-graph-title { font-size: 9px; color: var(--text3); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
.week-graph-bars { display: flex; align-items: flex-end; gap: 4px; height: 60px; }
.week-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
.week-bar { width: 100%; border-radius: 4px 4px 0 0; background: var(--accent); opacity: 0.7; transition: height 0.5s ease; min-height: 3px; position: relative; }
.week-bar.today { opacity: 1; }
.week-bar-label { font-size: 8px; color: var(--text3); }
.week-graph-total { font-size: 10px; color: var(--text3); margin-top: 8px; text-align: right; }

/* ===== SWIPE TIMER HINT ===== */
.skill-card-wrap { position: relative; margin-bottom: 10px; border-radius: 14px; overflow: hidden; }
.skill-card-timer-bg { position: absolute; left: 0; top: 0; bottom: 0; width: 80px; background: var(--accent); display: flex; align-items: center; justify-content: center; border-radius: 14px 0 0 14px; }
.skill-card-timer-bg i { font-size: 26px; color: var(--accentText); }
.skill-card { margin-bottom: 0; }

/* ===== FULLSCREEN TIMER ===== */
.timer-fullscreen { position: fixed; inset: 0; z-index: 990; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--grad); padding: 40px 24px; }
.timer-fs-skill { font-size: 13px; color: var(--text3); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.timer-fs-name { font-size: 22px; color: var(--text); font-weight: 500; margin-bottom: 40px; text-align: center; }
.timer-fs-display { font-family: var(--font-display); font-weight: var(--font-display-weight); font-size: 72px; color: var(--accent); letter-spacing: 4px; line-height: 1; margin-bottom: 12px; }

.timer-fs-sub { font-size: 12px; color: var(--text3); letter-spacing: 2px; margin-bottom: 60px; }
.timer-fs-paused { font-size: 13px; color: var(--accent); letter-spacing: 3px; margin-bottom: 8px; animation: blink 1.2s infinite; }
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
.timer-fs-btns { display: flex; gap: 16px; align-items: center; }
.timer-fs-btn-pause { width: 72px; height: 72px; border-radius: 50%; background: var(--bg2); border: 2px solid var(--border2); color: var(--accent); font-size: 28px; display: flex; align-items: center; justify-content: center; }
.timer-fs-btn-stop { width: 72px; height: 72px; border-radius: 50%; background: var(--accent); color: var(--accentText); font-size: 28px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 24px rgba(0,0,0,0.15); }
.timer-fs-progress { position: absolute; bottom: calc(env(safe-area-inset-bottom,0px) + 32px); left: 40px; right: 40px; }
.timer-fs-prog-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.timer-fs-prog-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 1s linear; opacity: 0.6; }
.timer-fs-goal { font-size: 10px; color: var(--text3); text-align: right; margin-top: 6px; letter-spacing: 1px; }

/* ===== CELEBRATION ===== */
.celebration { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 32px; backdrop-filter: blur(5px); }
.cel-icon { width: 96px; height: 96px; border-radius: 28px; background: var(--bg2); border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; animation: bounceIcon 0.7s infinite alternate; }
.cel-icon i { font-size: 48px; color: var(--accent); }
.cel-tag { font-size: 11px; letter-spacing: 2px; color: var(--accent); margin-bottom: 6px; font-family: var(--font-display); font-weight: var(--font-display-weight); }
.cel-title { font-size: 26px; color: #f0ede8; margin-bottom: 8px; }
.cel-sub { font-size: 15px; color: #ccc; margin-bottom: 20px; line-height: 1.6; }
.cel-hint { font-size: 10px; color: #666; letter-spacing: 2px; font-family: 'DM Sans',sans-serif; }
@keyframes bounceIcon { from{transform:scale(1) rotate(-3deg);}to{transform:scale(1.08) rotate(3deg);} }

/* ===== ONBOARDING ===== */
.onboarding { position: fixed; inset: 0; z-index: 1001; display: flex; flex-direction: column; background: var(--grad); padding: max(env(safe-area-inset-top,24px),32px) 28px calc(env(safe-area-inset-bottom,24px) + 32px); overflow-y: auto; }
.ob-logo { font-family: 'Pacifico', cursive; font-size: 28px; color: var(--accent); letter-spacing: 1px; margin-bottom: 6px; }
.ob-tagline { font-size: 13px; color: var(--text3); letter-spacing: 0.5px; margin-bottom: 36px; line-height: 1.6; }
.ob-steps { flex: 1; display: flex; flex-direction: column; gap: 0; margin-bottom: 32px; }
.ob-step { padding: 18px 0; border-bottom: 1px solid var(--border); display: flex; gap: 16px; align-items: flex-start; }
.ob-step:last-child { border-bottom: none; }
.ob-hour { font-family: 'Pacifico', cursive; font-size: 22px; color: var(--accent); min-width: 52px; line-height: 1.3; }
body.lang-ja .ob-hour, body.lang-zh .ob-hour { font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700; }
body.lang-ko .ob-hour { font-family: 'Jua', sans-serif; }
.ob-step-content { flex: 1; }
.ob-step-label { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
.ob-step-desc { font-size: 12px; color: var(--text3); line-height: 1.6; }
.ob-more { text-align: center; padding: 16px 0 4px; color: var(--text3); font-size: 13px; letter-spacing: 1px; }
.ob-more i { font-size: 18px; display: block; margin-top: 4px; color: var(--border2); }
.ob-lang-row { display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap; }
.ob-lang-btn { padding: 6px 14px; border-radius: 14px; border: 1.5px solid var(--border); background: var(--bg2); color: var(--text3); font-size: 12px; cursor: pointer; transition: all 0.2s; font-family: inherit; }
.ob-lang-btn.active { background: var(--accent); color: var(--accentText); border-color: var(--accent); }
.ob-btn { width: 100%; padding: 16px; background: var(--accent); color: var(--accentText); border-radius: 28px; font-size: 15px; font-weight: 700; letter-spacing: 1px; border: none; cursor: pointer; transition: opacity 0.2s; box-shadow: 0 4px 20px rgba(0,0,0,0.12); }
.ob-btn:active { opacity: 0.85; }

/* ===== EMPTY ===== */
.empty { text-align: center; padding: 52px 20px; color: var(--text3); }
.empty-icon { font-size: 48px; margin-bottom: 12px; color: var(--border2); }
.empty-txt { font-size: 13px; line-height: 1.7; }
.circle-wrap { display: flex; justify-content: center; margin-bottom: 18px; }
#confetti-canvas { position: fixed; top:0;left:0;width:100%;height:100%; pointer-events:none; z-index:1000; }
.pad { padding: 14px 20px; }
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb18{margin-bottom:18px}.mb20{margin-bottom:20px}
.hidden { display: none !important; }

        <div style="display:flex;align-items:center;gap:8px;margin-top:6px"><input class="form-input" type="number" id="new-goal" value="1000" style="flex:1"><span style="color:var(--text3);font-size:12px" data-i18n="hours"></span></div>
      </div>
      <button class="btn-primary" id="add-btn" onclick="addSkill()" disabled><i class="ph ph-check-circle"></i> <span data-i18n="add_btn"></span></button>
    </div>
    <div id="view-detail" class="pad hidden">
      <div class="detail-hd">
        <button class="btn-back" onclick="switchView('list')"><i class="ph ph-arrow-left"></i></button>
        <button onclick="deleteCurrentSkill()" style="background:none;color:var(--text3);font-size:18px;padding:4px 8px;opacity:0.6" title="削除"><i class="ph ph-trash"></i></button>
      </div>
      <div id="detail-content"></div>
    </div>
    <div id="view-log" class="pad hidden">
      <button class="btn-back mb18" onclick="switchView('detail')"><i class="ph ph-arrow-left"></i></button>
      <div id="log-header" class="add-section-title" style="font-size:16px;margin-bottom:18px"></div>
      <div class="mb16"><label class="form-label" data-i18n="log_time"></label><div class="chip-row" id="minute-chips"></div><input class="form-input" type="number" id="log-minutes" value="60"></div>
      <div class="mb18"><label class="form-label" data-i18n="log_note"></label><input class="form-input" id="log-note"></div>
      <button class="btn-primary" onclick="submitLog()"><i class="ph ph-pencil-simple"></i> <span data-i18n="log_btn"></span></button>
    </div>
  </div>
</div>

<!-- Celebration -->
<div class="celebration hidden" id="celebration" onclick="closeCelebration()">
  <div class="cel-icon"><i class="ph ph-star" id="cel-ph-icon"></i></div>
  <div class="cel-tag">achievement unlocked</div>
  <div class="cel-title" data-i18n="cel_title"></div>
  <div class="cel-sub" id="cel-text"></div>
  <div class="cel-hint" data-i18n="cel_hint"></div>
</div>

<!-- Settings Modal -->
<div class="settings-modal hidden" id="settings-modal">
  <div class="settings-header">
    <div class="settings-title" data-i18n="settings_title"></div>
    <button class="settings-close" onclick="closeSettings()"><i class="ph ph-x"></i></button>
  </div>
  <div class="settings-body">

    <!-- Language -->
    <div class="settings-section">
      <div class="settings-section-title" data-i18n="settings_lang"></div>
      <div class="lang-grid">
        <button class="lang-grid-btn active" id="lg-ja" onclick="setLangFromSettings('ja',this)">日本語</button>
        <button class="lang-grid-btn" id="lg-en" onclick="setLangFromSettings('en',this)">English</button>
        <button class="lang-grid-btn" id="lg-pt" onclick="setLangFromSettings('pt',this)">Português</button>
        <button class="lang-grid-btn" id="lg-zh" onclick="setLangFromSettings('zh',this)">繁體中文</button>
        <button class="lang-grid-btn" id="lg-ko" onclick="setLangFromSettings('ko',this)">한국어</button>
      </div>
    </div>

    <!-- Notifications -->
    <div class="settings-section">
      <div class="settings-section-title" data-i18n="settings_notif"></div>
      <div class="settings-row">
        <div>
          <div class="settings-row-label"><i class="ph ph-bell"></i> <span data-i18n="notif_daily"></span></div>
          <div class="settings-row-sub" data-i18n="notif_daily_sub"></div>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="notif-toggle" onchange="toggleNotification()">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="settings-row" id="notif-time-row" style="display:none">
        <div class="settings-row-label"><i class="ph ph-clock"></i> <span data-i18n="notif_time"></span></div>
        <input type="time" class="time-picker" id="notif-time" value="20:00" onchange="saveNotifTime()">
      </div>
    </div>

    <!-- Export / Import -->
    <div class="settings-section">
      <div class="settings-section-title" data-i18n="settings_data"></div>
      <button class="export-btn" onclick="exportData()" style="margin-bottom:8px">
        <i class="ph ph-download-simple"></i> <span data-i18n="export_btn"></span>
      </button>
      <button class="export-btn" onclick="document.getElementById('import-file').click()">
        <i class="ph ph-upload-simple"></i> <span data-i18n="import_btn"></span>
      </button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
    </div>

  </div>
</div>

<!-- Timer Save Modal -->
<div class="modal-ov hidden" id="timer-save-modal">
  <div class="modal-box">
    <div class="modal-title" id="timer-save-title"></div>
    <div id="timer-save-time" class="font-display" style="font-size:36px;color:var(--accent);text-align:center;margin:12px 0 4px;letter-spacing:2px"></div>
    <div id="timer-save-min" style="font-size:11px;color:var(--text3);text-align:center;margin-bottom:16px"></div>
    <label class="form-label" data-i18n="log_note"></label>
    <input class="form-input" id="timer-save-note" style="margin-bottom:4px">
    <div style="font-size:10px;color:var(--text3);margin-bottom:4px" id="timer-save-decimal"></div>
    <div class="modal-row">
      <button class="modal-cancel" onclick="cancelTimerSave()" data-i18n="timer_discard"></button>
      <button class="modal-ok" onclick="confirmTimerSave()" data-i18n="timer_save_btn"></button>
    </div>
  </div>
</div>

<!-- Extend Modal -->
<div class="modal-ov hidden" id="extend-modal">
  <div class="modal-box">
    <div class="modal-title" data-i18n="ext_title"></div>
    <p style="font-size:11px;color:var(--text3);margin-bottom:12px" data-i18n="ext_sub"></p>
    <div class="chip-row" id="extend-chips"></div>
    <div style="display:flex;align-items:center;gap:8px;margin-top:8px"><input class="form-input" type="number" id="extend-hours" style="flex:1"><span style="color:var(--text3);font-size:12px" data-i18n="hours"></span></div>
    <div class="modal-row"><button class="modal-cancel" onclick="closeExtend()" data-i18n="cancel"></button><button class="modal-ok" onclick="confirmExtend()" data-i18n="ext_ok"></button></div>
  </div>
</div>

<!-- Edit Name Modal -->
<div class="modal-ov hidden" id="edit-name-modal">

function fmtH(m){ return (m/60).toFixed(2); }

function fmtTime(m){
  // round to nearest minute first to avoid float issues
  const totalMin=Math.round(m);
  const h=Math.floor(totalMin/60), mm=totalMin%60;
  if(!h) return mm+t('min_unit');
  if(!mm) return h+t('h_unit');
  return h+t('h_unit')+mm+t('min_unit');
}
function getLevel(pct){ let l=MASTERY_LEVELS[0]; MASTERY_LEVELS.forEach(x=>{if(pct>=x.pct)l=x;}); return l; }

// ===== IndexedDB =====
const DB_NAME='mastery-pwa',DB_VERSION=1,STORE='appdata',DATA_KEY='main';
let db=null;
function openDB(){ return new Promise((res,rej)=>{ const r=indexedDB.open(DB_NAME,DB_VERSION); r.onupgradeneeded=e=>e.target.result.createObjectStore(STORE); r.onsuccess=e=>{db=e.target.result;res(db);}; r.onerror=()=>rej(r.error); }); }
function idbGet(k){ return new Promise((res,rej)=>{ const r=db.transaction(STORE,'readonly').objectStore(STORE).get(k); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
function idbSet(k,v){ return new Promise((res,rej)=>{ const r=db.transaction(STORE,'readwrite').objectStore(STORE).put(v,k); r.onsuccess=()=>res(); r.onerror=()=>rej(r.error); }); }
async function loadData(){
  try{ await openDB(); const s=await idbGet(DATA_KEY); if(s){data=s;}else{try{const o=localStorage.getItem('mastery-pwa-v4');if(o){data=JSON.parse(o);await saveData();}}catch(e){}} }
  catch(e){ try{const r=localStorage.getItem('mastery-pwa-v4');if(r)data=JSON.parse(r);}catch(e2){} }
  data.skills=data.skills||[];data.hall=data.hall||[];data.theme=data.theme||'auto';data.sortMode=data.sortMode||'added';data.lang=data.lang||'ja';
}
async function saveData(){ try{await idbSet(DATA_KEY,data);}catch(e){try{localStorage.setItem('mastery-pwa-v4',JSON.stringify(data));}catch(e2){}} }

function formatForecastDate(d){
  const y=d.getFullYear(), m=d.getMonth()+1;
  if(currentLang==='ja') return y+'年'+m+'月';
  if(currentLang==='zh') return y+'年'+m+'月';
  if(currentLang==='ko') return y+'년 '+m+'월';
  // en, pt: use month name
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[d.getMonth()]+' '+y;
}

  const avgMin=recent.length?recent.reduce((a,s)=>a+s.minutes,0)/recent.length:0;

  const activeDays=new Set(sk.sessions.map(s=>new Date(s.date).toDateString())).size;

  // Week graph (last 7 days)
  const dayLabels=['S','M','T','W','T','F','S'];
  const now2=new Date(); const weekMins=[];
  let maxMin=0;
  for(let i=6;i>=0;i--){
    const d=new Date(now2); d.setDate(d.getDate()-i);
    const ds=d.toDateString();
    const m=sk.sessions.filter(s=>new Date(s.date).toDateString()===ds).reduce((a,s)=>a+s.minutes,0);
    weekMins.push({m,day:dayLabels[d.getDay()],isToday:i===0});
    if(m>maxMin)maxMin=m;
  }
  const weekGraphHtml=`<div class="week-graph">
    <div class="week-graph-title">
      <span style="display:flex;align-items:center;gap:5px"><i class="ph ph-chart-bar"></i> Last 7 days</span>

let timerPaused=false;

function startTimer(skillId){
  timerSkillId=skillId; timerSeconds=0; timerPaused=false;
  const sk=data.skills.find(s=>s.id===skillId);
  // show fullscreen
  const fs=document.getElementById('timer-fullscreen');
  document.getElementById('tfs-name').textContent=sk?.name||'';
  document.getElementById('tfs-label').textContent=t('timer_now');
  document.getElementById('tfs-paused').classList.add('hidden');
  document.getElementById('tfs-pause-icon').className='ph ph-pause';
  const goalMin=sk?.goalMinutes||0, doneMin=sk?.totalMinutes||0;
  document.getElementById('tfs-goal').textContent=`${fmtH(doneMin)} / ${(goalMin/60).toFixed(0)}h`;
  document.getElementById('tfs-prog').style.width=Math.min(100,(doneMin/goalMin*100)).toFixed(1)+'%';
  fs.classList.remove('hidden');
  // also show banner for background
  document.getElementById('timer-skill-nm').innerHTML=`${iconEl(sk?.icon||'target',13)} ${sk?.name||''}`;
  document.getElementById('timer-banner').classList.remove('hidden');
  timerInterval=setInterval(()=>{
    if(timerPaused) return;
    timerSeconds++;
    updateTimerDisplay();
  },1000);
  renderDetail();
}

function updateTimerDisplay(){
  const h=String(Math.floor(timerSeconds/3600)).padStart(2,'0'),
        m=String(Math.floor((timerSeconds%3600)/60)).padStart(2,'0'),
        s=String(timerSeconds%60).padStart(2,'0');
  const timeStr=`${h}:${m}:${s}`;
  document.getElementById('tfs-display').textContent=timeStr;
  document.getElementById('timer-display').textContent=timeStr;
  const totalMin=Math.round(timerSeconds/6)/10;
  document.getElementById('tfs-sub').textContent=`${totalMin} min`;
}

function togglePause(){
  timerPaused=!timerPaused;
  const icon=document.getElementById('tfs-pause-icon');
  const pausedLabel=document.getElementById('tfs-paused');
  if(timerPaused){
    icon.className='ph ph-play';
    pausedLabel.classList.remove('hidden');
  } else {
    icon.className='ph ph-pause';
    pausedLabel.classList.add('hidden');
  }
}

function stopTimer(){
  clearInterval(timerInterval); timerInterval=null;
  releaseWakeLock(); timerPaused=false;
  document.getElementById('timer-fullscreen').classList.add('hidden');
  document.getElementById('timer-banner').classList.add('hidden');
  const elapsed=timerSeconds;
  timerSeconds=0;
  if(elapsed<1){ timerSkillId=null; renderDetail(); return; }
  const totalMin=Math.round(elapsed/6)/10;
  const h=String(Math.floor(elapsed/3600)).padStart(2,'0'),
        m=String(Math.floor((elapsed%3600)/60)).padStart(2,'0'),
        s=String(elapsed%60).padStart(2,'0');
  document.getElementById('timer-save-title').textContent=t('timer_save_title');
  document.getElementById('timer-save-time').textContent=`${h}:${m}:${s}`;
  document.getElementById('timer-save-min').textContent=t('timer_save_min_tpl',totalMin);
  document.getElementById('timer-save-note').value='';
  document.getElementById('timer-save-modal').classList.remove('hidden');
  window._pendingTimerMin=totalMin;
}

// ===== CONFETTI =====
function launchConfetti(){
  const canvas=document.getElementById('confetti-canvas');
  canvas.classList.remove('hidden');
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  const ctx=canvas.getContext('2d');

  // White & gold palette
  const cols=[
    '#ffffff','#fffde7','#fff9c4','#fff3cd',  // whites & cream
    '#ffd700','#ffca28','#ffb300','#ffc107',  // golds
    '#fff8e1','#ffe082','#ffecb3','#ffffee',  // pale gold & white
  ];

  // Draw star path
  function drawStar(ctx, r){
    const n=5, in_r=r*0.42;
    ctx.beginPath();
    for(let i=0;i<n*2;i++){
      const angle=(i*Math.PI/n)-Math.PI/2;
      const rad=i%2===0?r:in_r;
      i===0?ctx.moveTo(Math.cos(angle)*rad,Math.sin(angle)*rad)
           :ctx.lineTo(Math.cos(angle)*rad,Math.sin(angle)*rad);
    }
    ctx.closePath();
  }

  // Create particles - launched from bottom center in bursts
  const W=canvas.width, H=canvas.height;
  const origins=[W*0.3, W*0.5, W*0.7]; // 3 launch points
  const ps=[];

  origins.forEach((ox,oi)=>{
    const count=60;
    for(let i=0;i<count;i++){
      const angle=-Math.PI*(0.25+Math.random()*0.5); // upward arc
      const speed=Math.random()*18+10;
      const shape=['rect','circle','star'][Math.floor(Math.random()*3)];
      const r=Math.random()*5+3;
      ps.push({
        x:ox+(Math.random()-.5)*40,
        y:H+10,
        r,
        color:cols[Math.floor(Math.random()*cols.length)],
        vx:Math.cos(angle)*speed*(0.6+Math.random()*0.8),
        vy:Math.sin(angle)*speed,
        rot:Math.random()*360,
        rotV:(Math.random()-.5)*8,
        shape,
        alpha:1,
        delay:oi*80+Math.random()*60, // stagger bursts
        born:false,
      });
    }
  });

  let fr=0;
  let animId;

  function draw(){
    ctx.clearRect(0,0,W,H);
    let alive=false;

    ps.forEach(p=>{
      if(fr<p.delay/16){ alive=true; return; }
      if(!p.born){ p.born=true; }

      // Physics
      p.x+=p.vx;
      p.y+=p.vy;
      p.rot+=p.rotV;
      p.vy+=0.45; // gravity
      p.vx*=0.99; // air resistance

      // Fade out when falling below midpoint
      if(p.y>H*0.6) p.alpha=Math.max(0,p.alpha-0.018);
      if(p.y>H) p.alpha=0;

      if(p.alpha<=0) return;
      alive=true;

      ctx.save();
      ctx.globalAlpha=p.alpha;
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color;
      ctx.strokeStyle='rgba(255,220,50,0.3)';
      ctx.lineWidth=0.5;

      if(p.shape==='rect'){
        ctx.fillRect(-p.r,-p.r*0.5,p.r*2,p.r);
        ctx.strokeRect(-p.r,-p.r*0.5,p.r*2,p.r);
      } else if(p.shape==='circle'){
        ctx.beginPath();
        ctx.arc(0,0,p.r,0,Math.PI*2);
        ctx.fill();
        ctx.stroke();
      } else if(p.shape==='star'){
        drawStar(ctx,p.r*1.3);
        ctx.fill();
        ctx.stroke();
      }
      ctx.restore();
    });

    fr++;
    if(alive){
      animId=requestAnimationFrame(draw);
    } else {
      canvas.classList.add('hidden');
      cancelAnimationFrame(animId);
    }
  }

  if(canvas._confettiAnim) cancelAnimationFrame(canvas._confettiAnim);
  canvas._confettiAnim=requestAnimationFrame(draw);
}

  if(!data.onboardingDone){
    showOnboarding();
  } if(currentSkillId)renderDetail();
  // update settings title too
  document.querySelector('.settings-title').textContent=t('settings_title');
}

// ===== NOTIFICATIONS =====
function toggleNotification(){
  const on=document.getElementById('notif-toggle').checked;
  document.getElementById('notif-time-row').style.display=on?'flex':'none';
  if(!data.settings) data.settings={};
  data.settings.notifEnabled=on;
  if(on){
    requestNotifPermission();
  } else {
    cancelScheduledNotif();
  }
  saveData();
}
function saveNotifTime(){
  if(!data.settings) data.settings={};
  data.settings.notifTime=document.getElementById('notif-time').value;
  saveData();
  if(data.settings.notifEnabled) scheduleNotif();
}
async function requestNotifPermission(){
  if(!('Notification' in window)){ alert('このブラウザは通知をサポートしていません'); return; }
  const perm=await Notification.requestPermission();
  if(perm==='granted'){ scheduleNotif(); }
  else { document.getElementById('notif-toggle').checked=false; data.settings.notifEnabled=false; saveData(); }
}
function scheduleNotif(){
  // Store in localStorage for SW to pick up
  const time=data.settings?.notifTime||'20:00';
  localStorage.setItem('notif-enabled','true');
  localStorage.setItem('notif-time',time);
  // Show immediate confirmation
  if(Notification.permission==='granted'){
    new Notification('Mastery', {body:t('notif_set')});
  }
}
function cancelScheduledNotif(){
  localStorage.removeItem('notif-enabled');
}
// Check and fire daily notif
function checkDailyNotif(){
  if(!data.settings?.notifEnabled) return;
  if(Notification.permission!=='granted') return;
  const time=data.settings.notifTime||'20:00';
  const [hh,mm]=time.split(':').map(Number);
  const now=new Date();
  if(now.getHours()===hh && now.getMinutes()===mm){
    const today=now.toDateString();
    const practiced=data.skills.some(sk=>sk.sessions.some(s=>new Date(s.date).toDateString()===today));
    if(!practiced){
      new Notification('Mastery', {body:t('notif_remind')});
    }
  }
}
setInterval(checkDailyNotif, 60000);

// ===== EXPORT =====
function importData(event){
  const file=event.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=async(e)=>{
    try{
      const imported=JSON.parse(e.target.result);
      if(!imported.skills||!Array.isArray(imported.skills)) throw new Error('invalid');
      if(!confirm(t('import_warn'))) return;
      data=imported;
      data.skills=data.skills||[]; data.hall=data.hall||[]; data.theme=data.theme||'auto';
      data.sortMode=data.sortMode||'added'; data.lang=data.lang||'ja';
      await saveData();
      // re-apply
      currentLang=data.lang;
      document.body.className=document.body.className.replace(/lang-\w+/,'lang-'+currentLang);
      applyTheme(data.theme);
      const asw=document.getElementById('sw-'+data.theme);
      if(asw){document.querySelectorAll('.theme-swatch').forEach(d=>d.classList.remove('active'));asw.classList.add('active');}
      applyI18n(); renderList();
  // Show onboarding on first visit
  if(!data.onboardingDone){
    showOnboarding();
  } closeSettings();
      alert(t('import_ok'));
    }catch(err){
      alert(t('import_err'));
    }
    event.target.value='';
  };
  reader.readAsText(file);
}

function exportData(){
  const json=JSON.stringify(data, null, 2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`mastery-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
}

// ===== DRAG & DROP SORT =====
let _dragSrcId = null;

function onCardDragStart(e, id){
  _dragSrcId = id;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(()=>{ document.getElementById('scw-'+id)?.classList.add('dragging'); }, 0);
}
function onCardDragEnd(e, id){
  document.getElementById('scw-'+id)?.classList.remove('dragging');
  document.querySelectorAll('.skill-card-wrap').forEach(el=>el.classList.remove('drag-over'));
}
function onCardDragOver(e, id){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.skill-card-wrap').forEach(el=>el.classList.remove('drag-over'));
  if(id !== _dragSrcId) document.getElementById('scw-'+id)?.classList.add('drag-over');
}
function onCardDrop(e, id){
  e.preventDefault();
  if(!_dragSrcId || _dragSrcId === id) return;
  document.querySelectorAll('.skill-card-wrap').forEach(el=>el.classList.remove('drag-over'));
  // Reorder skills array
  const skills = getSortedSkills();
  const srcIdx = skills.findIndex(s=>s.id===_dragSrcId);
  const dstIdx = skills.findIndex(s=>s.id===id);
  if(srcIdx < 0 || dstIdx < 0) return;
  // Reorder in data.skills to match new order
  const srcSkill = data.skills.find(s=>s.id===_dragSrcId);
  const dstSkill = data.skills.find(s=>s.id===id);
  const si = data.skills.indexOf(srcSkill);
  const di = data.skills.indexOf(dstSkill);
  data.skills.splice(si, 1);
  data.skills.splice(di, 0, srcSkill);
  data.sortMode = 'added'; // switch to manual order
  saveData();
  renderList();
  _dragSrcId = null;
}

// ===== CARD SWIPE (list → timer) =====
let cardSwipeTouchX=0, cardSwipeActive=null, cardSwipeTriggered=false;
function cardSwipeStart(e,id){ cardSwipeTouchX=e.touches[0].clientX; cardSwipeActive=id; cardSwipeTriggered=false; const c=document.getElementById('sc-'+id); if(c)c.classList.add('swiping'); }
function cardSwipeMove(e,id){
  if(cardSwipeActive!==id)return;
  const dx=e.touches[0].clientX-cardSwipeTouchX;
  if(dx<=0)return;
  const c=document.getElementById('sc-'+id);
  if(c){ const clamp=Math.min(dx,80); c.style.transform=`translateX(${clamp}px)`; cardSwipeTriggered=clamp>=60; }
}
function cardSwipeEnd(e,id){
  if(cardSwipeActive!==id)return;
  const c=document.getElementById('sc-'+id);
  if(c){ c.classList.remove('swiping'); c.style.transform=''; }
  if(cardSwipeTriggered && !timerInterval){
    currentSkillId=id; startTimer(id);
  }
  cardSwipeActive=null;
}

// ===== HALL SWIPE =====
let swipeTouchX=0, swipeActive=null, swipeConfirmed=false;
const SWIPE_THRESHOLD=60;

function swipeStart(e,id){
  swipeTouchX=e.touches[0].clientX;
  swipeActive=id;
  swipeConfirmed=false;
  const card=document.getElementById('hc-'+id);
  if(card) card.classList.add('swiping');
}
function swipeMove(e,id){
  if(swipeActive!==id)return;
  const dx=e.touches[0].clientX-swipeTouchX;
  if(dx>=0)return; // only left swipe
  const card=document.getElementById('hc-'+id);
  if(card){
    const clamp=Math.max(dx,-80);
    card.style.transform=`translateX(${clamp}px)`;
    swipeConfirmed=clamp<=-SWIPE_THRESHOLD;
  }
}
function swipeEnd(e,id){
  if(swipeActive!==id)return;
  const card=document.getElementById('hc-'+id);
  if(card) card.classList.remove('swiping');
  if(swipeConfirmed){
    // snap open
    if(card) card.style.transform='translateX(-80px)';
    // confirm delete after short delay
    setTimeout(()=>{
      if(confirm(t('confirm_del_hall'))){ deleteHall(id); }
      else { if(card){card.style.transform=''; card.style.transition='transform 0.25s ease';} }
    },100);
  } else {
    if(card){ card.style.transform=''; }
  }
  swipeActive=null;
}

// ===== ONBOARDING =====
function showOnboarding(){
  const ob=document.getElementById('onboarding');
  if(!ob) return;
  // Sync lang buttons
  document.querySelectorAll('.ob-lang-btn').forEach(b=>{
    const l=b.getAttribute('onclick').match(/'(\w+)'/)?.[1];
    b.classList.toggle('active', l===currentLang);
  });
  updateOnboardingLang();
  ob.classList.remove('hidden');
}

function setObLang(lang, btn){
  // Update language
  currentLang=lang; data.lang=lang;
  document.body.className=document.body.className.replace(/lang-\w+/,'lang-'+lang);
  // Update active button in onboarding
  document.querySelectorAll('.ob-lang-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  // Re-render onboarding content
  updateOnboardingLang();
}

function updateOnboardingLang(){
  const c=OB_CONTENT[currentLang]||OB_CONTENT.ja;
  document.getElementById('ob-tagline').textContent=c.tagline;
  document.getElementById('ob-label-20').textContent=c.label_20;
  document.getElementById('ob-desc-20').textContent=c.desc_20;
  document.getElementById('ob-label-100').textContent=c.label_100;
  document.getElementById('ob-desc-100').textContent=c.desc_100;
  document.getElementById('ob-label-500').textContent=c.label_500;
  document.getElementById('ob-desc-500').textContent=c.desc_500;
  document.getElementById('ob-more-text').textContent=c.more;
  document.getElementById('ob-btn').textContent=c.btn;
}

function closeOnboarding(){
  document.getElementById('onboarding').classList.add('hidden');
  data.onboardingDone=true;
  saveData();
}
